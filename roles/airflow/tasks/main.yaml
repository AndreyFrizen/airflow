- name: Copy docker-compose template
  template:
    src: docker-compose.yaml.j2
    dest: /opt/airflow/docker-compose.yaml

- name: Copy webserver_config
  template:
    src: webserver_config.py
    dest: /opt/airflow/webserver_config.py

- name: Copy config files to destination
  copy:
    src: "{{ item.src }}"
    dest: "/opt/airflow/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: "prometheus.yml", dest: "prometheus.yml" }

- name: Copy airflow.cfg to destination
  template:
    src: airflow.cfg.j2
    dest: /opt/airflow/airflow.cfg
    owner: root
    group: root
    mode: "0644"

- name: Launch stack
  shell:
    cmd: docker compose up -d
    chdir: /opt/airflow
